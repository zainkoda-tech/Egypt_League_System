<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام تحليل الدوري المصري - زين</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; }
        table { margin: 20px auto; border-collapse: collapse; width: 80%; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>نتائج الدوري المصري - نسخة زين 2026</h1>
    <div id="data-table">جاري تحميل البيانات من GitHub...</div>

    <script>
        // الابن التاسع: سحب البيانات من ملف الـ CSV الذي أنشأته
        fetch('egypt_2024_results.csv')
            .then(response => response.text())
            .then(data => {
                let rows = data.split('\n');
                let table = '<table>';
                rows.forEach((row, index) => {
                    let cols = row.split(',');
                    table += '<tr>';
                    cols.forEach(col => {
                        table += index === 0 ? `<th>${col}</th>` : `<td>${col}</td>`;
                    });
                    table += '</tr>';
                });
                table += '</table>';
                document.getElementById('data-table').innerHTML = table;
            });
    </script>
</body>
</html>
